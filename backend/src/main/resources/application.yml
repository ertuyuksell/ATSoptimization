server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: resume-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resumedb}
    username: ${DB_USER:resume}
    password: ${DB_PASSWORD:resume}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc.lob.non_contextual_creation: true
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 16MB

app:
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-very-long-random-secret-change-me-very-long}
      expiration-ms: 86400000
  ai:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
    api-key: ${AI_SERVICE_KEY:change-me-internal-key}
    timeout-seconds: 60

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.springframework.security: INFO
    com.cvproje: INFO
